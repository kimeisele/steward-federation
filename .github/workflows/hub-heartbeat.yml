name: Federation Hub Heartbeat

on:
  schedule:
    - cron: '5-59/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hub-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout steward-federation
        uses: actions/checkout@v4

      - name: Write hub heartbeat to mailbox
        run: |
          pip install -q 'git+https://github.com/kimeisele/steward-federation.git' 2>/dev/null || true
          mkdir -p data/federation
          nadi --peer-json data/federation/peer.json heartbeat --health 1.0
      - name: Commit heartbeat to hub
        run: |
          git config user.name "steward-federation-bot"
          git config user.email "bot@steward-federation"
          git add nadi/steward-federation_to_steward.json
          git diff --cached --quiet || \
            git commit -m "relay: steward-federation hub heartbeat #${{ github.run_number }}"
          max_retries=10
          count=0
          until git push origin main; do
            count=$((count+1))
            if [ $count -gt $max_retries ]; then
              echo "Push failed after $max_retries attempts"
              exit 1
            fi
            backoff=$(( (RANDOM % 15) + 2 ))
            echo "Race condition. Backoff ${backoff}s then rebase..."
            sleep $backoff
            git pull --rebase origin main
          done

